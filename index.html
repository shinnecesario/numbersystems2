<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Gates Activity</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#1f2937;--border:#d1d5db;--accent:#2563eb;--success:#16a34a;--danger:#dc2626}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);display:flex;justify-content:center;padding:24px}
.app{max-width:850px;width:100%;background:#fff;border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.screen{display:none}.screen.active{display:block}
input{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;margin-top:6px}
.field{margin-bottom:12px}
button{border:none;background:var(--accent);color:#fff;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer}
.secondary{background:#374151}.success{background:var(--success)}
.flashcard{border:2px solid var(--border);border-radius:16px;padding:25px;text-align:center;margin:15px 0}
.question{font-size:24px;font-weight:bold}
.topbar{display:flex;justify-content:space-between;flex-wrap:wrap;background:#f9fafb;padding:10px;border-radius:10px;margin-bottom:15px}
.error{display:none;color:var(--danger);font-weight:bold}
</style>
</head>
<body>
<div class="app">

<section id="splashScreen" class="screen active">
<h1>Logic Gates Activity</h1>
<div class="field"><label>First Name</label><input id="firstName"></div>
<div class="field"><label>Last Name</label><input id="lastName"></div>
<div class="field"><label>Date</label><input type="date" id="quizDate"></div>
<div class="field"><label>Magic Password</label><input type="password" id="magicPassword"></div>
<div id="loginError" class="error">Complete all fields and enter the correct password.</div>
<button onclick="startQuiz()">Open Quiz</button>
</section>

<section id="instructionScreen" class="screen">
<h2 id="instructionTitle"></h2>
<div class="flashcard"><div id="instructionText" class="question"></div></div>
<button onclick="continueToQuestions()">Start Activity</button>
</section>

<section id="quizScreen" class="screen">
<h1>Logic Gates Quiz</h1>
<div class="topbar">
<div>Student: <span id="studentNameTop"></span></div>
<div>Item <span id="itemNumber"></span>/<span id="totalItems"></span></div>
</div>
<div class="flashcard">
<div id="question" class="question"></div>
</div>
<input id="studentAnswer" placeholder="Type your answer">
<br><br>
<button class="secondary" onclick="previousCard()">Previous</button>
<button onclick="nextCard()" id="nextBtn">Next</button>
</section>

<section id="resultScreen" class="screen">
<h2>Quiz Completed</h2>
<p><b>Name:</b> <span id="resultName"></span></p>
<p><b>Date:</b> <span id="resultDate"></span></p>
<p><b>Score:</b> <span id="finalScore"></span></p>
<button class="success" onclick="downloadResult()">Download Result</button>
</section>

</div>

<script>
const MAGIC_PASSWORD="lastactivity";
const POINTS_PER_ITEM=3;

const categoryInstructions={
"True or False":"Read each statement carefully. Type TRUE if correct and FALSE if incorrect.",
"Identify the Logic Gate":"Identify the logic gate being described.",
"Truth Table":"Determine the correct output based on the given inputs.",
"Real-Life Application":"Identify which logic gate best matches the situation.",
"Think Like a Computer":"Analyze the inputs and determine the output."
};

const questionBank=[
{category:"True or False",q:"Logic gates are the building blocks of digital circuits.",a:"TRUE"},
{category:"True or False",q:"Binary logic uses the numbers 0 and 1.",a:"TRUE"},
{category:"True or False",q:"The NOT gate produces the same output as the input.",a:"FALSE"},
{category:"True or False",q:"An AND gate requires all inputs to be 1 for the output to be 1.",a:"TRUE"},
{category:"True or False",q:"An OR gate outputs 1 if at least one input is 1.",a:"TRUE"},
{category:"Identify the Logic Gate",q:"Produces the opposite output of the input.",a:"NOT"},
{category:"Identify the Logic Gate",q:"Outputs 1 if at least one input is 1.",a:"OR"},
{category:"Identify the Logic Gate",q:"Outputs 1 only when all inputs are 1.",a:"AND"},
{category:"Identify the Logic Gate",q:"Outputs 1 when inputs are different.",a:"XOR"},
{category:"Identify the Logic Gate",q:"Outputs 1 when inputs are the same.",a:"XNOR"},
{category:"Identify the Logic Gate",q:"Opposite of an AND gate.",a:"NAND"},
{category:"Identify the Logic Gate",q:"Opposite of an OR gate.",a:"NOR"},
{category:"Truth Table",q:"NOT Gate: A = 0, Output = ?",a:"1"},
{category:"Truth Table",q:"NOT Gate: A = 1, Output = ?",a:"0"},
{category:"Truth Table",q:"AND Gate: A=0, B=0, Output = ?",a:"0"},
{category:"Truth Table",q:"AND Gate: A=0, B=1, Output = ?",a:"0"},
{category:"Truth Table",q:"AND Gate: A=1, B=0, Output = ?",a:"0"},
{category:"Truth Table",q:"AND Gate: A=1, B=1, Output = ?",a:"1"},
{category:"Truth Table",q:"OR Gate: A=0, B=0, Output = ?",a:"0"},
{category:"Truth Table",q:"OR Gate: A=0, B=1, Output = ?",a:"1"},
{category:"Truth Table",q:"OR Gate: A=1, B=0, Output = ?",a:"1"},
{category:"Truth Table",q:"OR Gate: A=1, B=1, Output = ?",a:"1"},
{category:"Real-Life Application",q:"A student enters the school if he has an ID card AND wears the proper uniform.",a:"AND"},
{category:"Real-Life Application",q:"A fire alarm sounds when smoke OR heat is detected.",a:"OR"},
{category:"Real-Life Application",q:"A lamp automatically turns on when it becomes dark.",a:"NOT"},
{category:"Real-Life Application",q:"Two passwords are compared. Access is granted when both passwords are the same.",a:"XNOR"},
{category:"Real-Life Application",q:"A game awards points when two answers are different.",a:"XOR"},
{category:"Think Like a Computer",q:"A=0, B=0, OR Gate. Output = ?",a:"0"},
{category:"Think Like a Computer",q:"A=1, B=1, AND Gate. Output = ?",a:"1"},
{category:"Think Like a Computer",q:"A=0, NOT Gate. Output = ?",a:"1"},
{category:"Think Like a Computer",q:"A=1, B=0, XOR Gate. Output = ?",a:"1"},
{category:"Think Like a Computer",q:"A=1, B=1, NAND Gate. Output = ?",a:"0"},
{category:"Think Like a Computer",q:"A=0, B=0, NOR Gate. Output = ?",a:"1"},
{category:"Think Like a Computer",q:"A=1, B=1, XNOR Gate. Output = ?",a:"1"}
];

let current=0, answers=new Array(questionBank.length).fill(""), student={};

function showScreen(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');}
document.getElementById('quizDate').value=new Date().toISOString().split('T')[0];

function startQuiz(){
 let fn=firstName.value.trim(), ln=lastName.value.trim(), dt=quizDate.value, pw=magicPassword.value;
 if(!fn||!ln||!dt||pw!==MAGIC_PASSWORD){loginError.style.display='block';return;}
 student={fn,ln,dt,pw};
 studentNameTop.textContent=fn+" "+ln;
 loadCard();
}

function showInstruction(cat){
 instructionTitle.textContent=cat;
 instructionText.textContent=categoryInstructions[cat];
 showScreen('instructionScreen');
}
function continueToQuestions(){renderQuestion();showScreen('quizScreen');}
function renderQuestion(){
 let q=questionBank[current];
 itemNumber.textContent=current+1;
 totalItems.textContent=questionBank.length;
 question.textContent=q.q;
 studentAnswer.value=answers[current]||"";
 nextBtn.textContent=current===questionBank.length-1?"Finish":"Next";
}
function loadCard(){
 let q=questionBank[current];
 if(current===0||questionBank[current-1].category!==q.category){showInstruction(q.category);}
 else {renderQuestion();showScreen('quizScreen');}
}
function previousCard(){answers[current]=studentAnswer.value;if(current>0){current--;renderQuestion();}}
function nextCard(){
 answers[current]=studentAnswer.value;
 if(current<questionBank.length-1){current++;loadCard();}
 else finishQuiz();
}
function finishQuiz(){
 let score=0;
 questionBank.forEach((q,i)=>{if((answers[i]||'').trim().toUpperCase()===q.a.toUpperCase())score+=POINTS_PER_ITEM;});
 resultName.textContent=student.fn+" "+student.ln;
 resultDate.textContent=student.dt;
 finalScore.textContent=score+" / "+(questionBank.length*POINTS_PER_ITEM)+" points";
 showScreen('resultScreen');
}
 

function downloadResult() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 1000;
  canvas.height = 600;

  // Background
  ctx.fillStyle = "#f0fdf4";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Border
  ctx.strokeStyle = "#16a34a";
  ctx.lineWidth = 4;
  ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

  // Title
  ctx.fillStyle = "#1f2937";
  ctx.font = "bold 40px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Logic Gates Quiz Result", canvas.width / 2, 80);

  // Student Information
  ctx.textAlign = "left";
  ctx.font = "28px Arial";

  let y = 170;

  ctx.fillText(
    "Student Name: " + student.fn + " " + student.ln,
    80,
    y
  );

  y += 60;

  ctx.fillText(
    "Date: " + student.dt,
    80,
    y
  );

  y += 60;

  ctx.fillText(
    "Score: " + finalScore.textContent,
    80,
    y
  );

  y += 100;

  // Footer
  ctx.font = "22px Arial";
  ctx.fillStyle = "#6b7280";
  ctx.fillText(
    "Generated by Logic Gates Activity",
    80,
    y
  );

  const link = document.createElement("a");
  link.href = canvas.toDataURL("image/png");
  link.download =
    student.fn +
    "_" +
    student.ln +
    "_LogicGatesResult.png";

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

</script>
</body>
</html>
